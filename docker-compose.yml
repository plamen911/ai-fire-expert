services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_rag_app
    restart: unless-stopped
    env_file:
      - .docker-env
    volumes:
      - .:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - laravel_rag

  nginx:
    build:
      context: .
      dockerfile: Dockerfile-nginx
    container_name: laravel_rag_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
    depends_on:
      app:
        condition: service_healthy
    networks:
      - laravel_rag

  postgres:
    image: pgvector/pgvector:pg17
    container_name: laravel_rag_postgres
    restart: unless-stopped
    env_file:
      - .docker-env
    environment:
      POSTGRES_DB: ${DOCKER_DB_DATABASE:-laravel_rag}
      POSTGRES_USER: ${DOCKER_DB_USERNAME:-root}
      POSTGRES_PASSWORD: ${DOCKER_DB_PASSWORD:-Mitkov4069}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d laravel_rag"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - laravel_rag

  redis:
    image: redis:7-alpine
    container_name: laravel_rag_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - laravel_rag

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: laravel_rag_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - laravel_rag

volumes:
  pgdata:

networks:
  laravel_rag:
    driver: bridge
