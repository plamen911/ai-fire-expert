services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: laravel_rag_app
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - app_storage:/var/www/html/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - laravel_rag

  nginx:
    build:
      context: .
      dockerfile: Dockerfile-nginx
      args:
        NGINX_CONF: deploy/nginx/default.prod.conf
    container_name: laravel_rag_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - app_storage:/var/www/html/storage:ro
      - certbot_etc:/etc/letsencrypt:ro
      - certbot_var:/var/lib/letsencrypt
    depends_on:
      app:
        condition: service_healthy
    networks:
      - laravel_rag

  certbot:
    image: certbot/certbot:latest
    container_name: laravel_rag_certbot
    volumes:
      - certbot_etc:/etc/letsencrypt
      - certbot_var:/var/lib/letsencrypt
    depends_on:
      - nginx
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/lib/letsencrypt --quiet; sleep 12h & wait $${!}; done'"

  postgres:
    image: pgvector/pgvector:pg17
    container_name: laravel_rag_postgres
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      POSTGRES_DB: ${DOCKER_DB_DATABASE:-laravel_rag}
      POSTGRES_USER: ${DOCKER_DB_USERNAME:-laravel_rag}
      POSTGRES_PASSWORD: ${DOCKER_DB_PASSWORD:?Set DOCKER_DB_PASSWORD in .env.production}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DOCKER_DB_USERNAME:-laravel_rag} -d ${DOCKER_DB_DATABASE:-laravel_rag}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - laravel_rag

  redis:
    image: redis:7-alpine
    container_name: laravel_rag_redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - laravel_rag

volumes:
  pgdata:
  app_storage:
  certbot_etc:
  certbot_var:

networks:
  laravel_rag:
    driver: bridge
